<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Scanner Pro</title>
    <style>
        :root { --p: #2563eb; --bg: #ffffff; --txt: #1e293b; --card: #f8fafc; }
        [data-theme="dark"] { --bg: #0f172a; --txt: #f1f5f9; --card: #1e293b; }
        
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--txt); margin: 0; transition: 0.3s; }
        
        .app-container { max-width: 450px; margin: 0 auto; padding: 20px; }
        
        .nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .camera-view { 
            position: relative; width: 100%; aspect-ratio: 3/4; 
            background: #000; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 30%; border: 2px dashed rgba(255,255,255,0.5); border-radius: 10px;
        }

        .controls { margin-top: 20px; display: grid; gap: 10px; }
        
        button { 
            padding: 16px; border: none; border-radius: 12px; font-size: 16px; 
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        
        .btn-main { background: var(--p); color: white; }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .inventory { margin-top: 30px; background: var(--card); border-radius: 15px; padding: 15px; }
        
        .item-row { 
            display: grid; grid-template-columns: 1fr 1fr 60px; gap: 5px;
            padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px;
        }
        
        .loader { font-size: 12px; text-align: center; color: var(--p); display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="nav">
        <h2 style="margin:0">Mercado IA 📦</h2>
        <button onclick="document.body.toggleAttribute('data-theme')" style="padding:5px 10px; background:none; border:1px solid #ccc; color:inherit">🌓</button>
    </div>

    <div class="camera-view">
        <video id="v" autoplay playsinline></video>
        <div class="overlay"></div>
    </div>

    <div class="controls">
        <div id="loader" class="loader">IA está analisando a etiqueta... aguarde...</div>
        <button id="btn" class="btn-main" onclick="scan()">ESCANEAR PRODUTO</button>
    </div>

    <div class="inventory">
        <h4 style="margin-top:0">Últimos Lançamentos</h4>
        <div id="list">
            <div style="text-align:center; color:#999; font-size:13px">Nenhum produto lido ainda.</div>
        </div>
    </div>
</div>

<canvas id="c" style="display:none"></canvas>

<script>
    // SUA CHAVE JÁ CONFIGURADA
    const KEY = 'AIzaSyCZbo9rhCsY83l8myxTnqb_ahsiQ1SnUr8';
    
    const v = document.getElementById('v');
    const c = document.getElementById('c');
    const list = document.getElementById('list');
    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');

    // Iniciar Câmera
    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
    }).then(s => v.srcObject = s);

    async function scan() {
        btn.disabled = true;
        loader.style.display = 'block';
        
        // Captura foto
        c.width = v.videoWidth;
        c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        const img = c.toDataURL('image/jpeg', 0.8).split(',')[1];

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "Analise a etiqueta. Retorne APENAS um JSON: {\"marca\":\"\",\"produto\":\"\",\"quantidade\":\"\",\"preco\":\"\"}" },
                        { inline_data: { mime_type: "image/jpeg", data: img } }
                    ]}]
                })
            });

            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            const json = JSON.parse(text.match(/\{.*\}/s)[0]); // Pega apenas o JSON do texto

            addToList(json);
        } catch (e) {
            alert("Erro ao ler. Tente focar mais de perto!");
        } finally {
            btn.disabled = false;
            loader.style.display = 'none';
        }
    }

    function addToList(j) {
        if(list.innerText.includes("Nenhum")) list.innerHTML = '';
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <div><b>${j.marca || 'S/M'}</b><br><small>${j.produto || 'Item'}</small></div>
            <div>${j.quantidade || '-'}</div>
            <div style="text-align:right; color:green">R$ ${j.preco || '0.00'}</div>
        `;
        list.prepend(row);
    }
</script>

</body>
</html>
